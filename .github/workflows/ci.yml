name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # pnpm 11 needs Node >=22.13 to RUN THE BUILD; the published bundle
        # itself still targets/supports Node >=20 (esbuild target node20,
        # no post-20 APIs).
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check
      - run: pnpm build
      - run: pnpm test
      - name: stamped artifacts are current
        run: git diff --exit-code platforms/
