name: publish

# OIDC trusted publishing for @agentchatme/cli, gated by a human
# approval. 2026-07-13: converted from token auth WITH EVIDENCE — a
# fresh granular token EOTP'd from this very pipeline; npm's hardening
# now demands OTP for ALL token writes on 2FA-enforced accounts.
# Supersedes the 2026-05 no-OIDC decision, with sanim's sign-off.
#
# Release flow: bump version (core/package.json + version.ts + plugin
# manifests, lockstep) → tag `cli-v*` → push. The gate re-runs the full
# quality bar incl. the stamped-artifact byte check; the publish job
# waits at the `npm-publish` environment for a one-tap approval. Auth is
# OIDC: npm trusts THIS repo+workflow+environment, mints per-run
# credentials, and attaches provenance. No tokens anywhere.

on:
  push:
    tags:
      - "cli-v*"

jobs:
  # Temporary diagnostic (remove once the npm pairing is proven): prints
  # the OIDC claim fields npm matches against the trusted-publisher rule.
  # Runs ungated — claims only, never the token itself.
  oidc-claims:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: decode claim fields
        run: |
          T=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm%3Aregistry.npmjs.org" | jq -r .value)
          PAY=$(echo "$T" | cut -d. -f2 | tr '_-' '/+' )
          PAD=$(( (4 - ${#PAY} % 4) % 4 )); PAY="$PAY$(printf '=%.0s' $(seq 1 $PAD 2>/dev/null))"
          echo "$PAY" | base64 -d 2>/dev/null | jq '{aud, repository, repository_owner, workflow_ref, job_workflow_ref, event_name, ref}'

  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check
      - run: pnpm build
      - run: pnpm test
      - name: stamped artifacts are current
        run: git diff --exit-code platforms/
      - name: tag matches core package version
        run: |
          pkg="cli-v$(node -p "require('./core/package.json').version")"
          [ "$pkg" = "$GITHUB_REF_NAME" ] || { echo "tag $GITHUB_REF_NAME != package $pkg"; exit 1; }

  publish:
    needs: gate
    runs-on: ubuntu-latest
    environment: npm-publish # requires manual approval — the human gate
    permissions:
      id-token: write # OIDC exchange with npm (trusted publishing)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # OIDC exchange needs a current npm CLI
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @agentchatme/cli build
      - run: cd core && npm publish --provenance --access public